<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="840" viewBox="0 0 1280 840">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#f8f1e8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f7fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1280" height="840" fill="url(#bg)"/>

  <text x="640" y="60" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="34" font-weight="700" fill="#162033">
    GoldView TrafficMonitor 类任务栏实现方案
  </text>
  <text x="640" y="96" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" fill="#586882">
    关键不是贴边窗口，而是压缩任务栏图标区并把 GoldView 放进同层级槽位
  </text>

  <rect x="70" y="145" width="540" height="500" rx="26" fill="url(#card)" stroke="#d8e2ef" filter="url(#shadow)"/>
  <text x="110" y="192" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="24" font-weight="700" fill="#162033">
    TrafficMonitor 类任务栏效果
  </text>

  <rect x="118" y="248" width="445" height="240" rx="16" fill="#dce6f4" stroke="#b7c6dd"/>
  <rect x="140" y="406" width="403" height="56" rx="10" fill="#151922"/>
  <rect x="164" y="418" width="150" height="30" rx="8" fill="#0f1318" stroke="#2a3340"/>
  <circle cx="365" cy="434" r="9" fill="#6c7b95"/>
  <circle cx="395" cy="434" r="9" fill="#6c7b95"/>
  <circle cx="425" cy="434" r="9" fill="#6c7b95"/>
  <circle cx="455" cy="434" r="9" fill="#6c7b95"/>
  <rect x="485" y="416" width="40" height="34" rx="8" fill="#0f1318" stroke="#2a3340"/>
  <text x="239" y="438" text-anchor="middle" font-family="Consolas, Segoe UI, monospace" font-size="18" fill="#86ff9a">
    金价 3345.20
  </text>
  <text x="340" y="498" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" fill="#33425b">
    先压缩任务栏应用区，再把 GoldView 插入到新槽位
  </text>

  <text x="110" y="550" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" fill="#33425b">
    核心动作
  </text>
  <text x="110" y="585" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" fill="#33425b">
    • 查找 Shell_TrayWnd → ReBarWindow32/WorkerW → MSTaskSwWClass/MSTaskListWClass
  </text>
  <text x="110" y="618" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" fill="#33425b">
    • 缩小任务栏图标区宽度，为 GoldView 让出显示槽位
  </text>

  <rect x="670" y="145" width="540" height="500" rx="26" fill="url(#card)" stroke="#d8e2ef" filter="url(#shadow)"/>
  <text x="710" y="192" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="24" font-weight="700" fill="#162033">
    代码实现链路
  </text>

  <rect x="730" y="245" width="420" height="54" rx="14" fill="#ffffff" stroke="#cfd8e7"/>
  <text x="940" y="279" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" font-weight="700" fill="#162033">
    TaskbarTopologyDetector
  </text>

  <rect x="730" y="328" width="420" height="54" rx="14" fill="#ffffff" stroke="#cfd8e7"/>
  <text x="940" y="362" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" font-weight="700" fill="#162033">
    TaskbarSlotController
  </text>

  <rect x="730" y="411" width="420" height="54" rx="14" fill="#ffffff" stroke="#cfd8e7"/>
  <text x="940" y="445" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" font-weight="700" fill="#162033">
    TaskbarHost / FloatingHost
  </text>

  <rect x="730" y="494" width="420" height="54" rx="14" fill="#ffffff" stroke="#cfd8e7"/>
  <text x="940" y="528" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" font-weight="700" fill="#162033">
    PriceService / SettingsStore / ModeController
  </text>

  <path d="M940 299 L940 328" stroke="#5d6f8c" stroke-width="4" stroke-linecap="round"/>
  <path d="M940 382 L940 411" stroke="#5d6f8c" stroke-width="4" stroke-linecap="round"/>
  <path d="M940 465 L940 494" stroke="#5d6f8c" stroke-width="4" stroke-linecap="round"/>

  <text x="710" y="585" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="18" fill="#33425b">
    Win11 修正
  </text>
  <text x="710" y="618" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" fill="#33425b">
    • 搜索按钮宽度 • Widgets 预留 • 无图标时偏移 • DPI 变化
  </text>

  <rect x="140" y="700" width="1000" height="72" rx="18" fill="#ffffff" stroke="#d6deed" filter="url(#shadow)"/>
  <text x="640" y="732" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="22" font-weight="700" fill="#162033">
    GoldView 从“任务栏感知窗口”升级为“任务栏应用区重排 + 任务栏宿主窗口”
  </text>
  <text x="640" y="758" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="15" fill="#586882">
    退出或切换模式时恢复任务栏图标区，避免长期污染 Explorer 布局
  </text>
</svg>
